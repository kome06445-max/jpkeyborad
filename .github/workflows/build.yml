name: Build BSDJP on FreeBSD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-freebsd:
    name: FreeBSD Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg install -y \
              cmake \
              pkgconf \
              xcb-imdkit \
              libxcb \
              xcb-util \
              xcb-util-keysyms \
              cairo \
              pango \
              libX11 \
              xorgproto \
              ja-font-ipa
          run: |
            echo "=== Configuring ==="
            mkdir build
            cd build
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_FLAGS="-Wall -Wextra"

            echo ""
            echo "=== Building ==="
            make -j$(sysctl -n hw.ncpu)

            echo ""
            echo "=== Running romaji conversion tests ==="
            ./test_romaji

            echo ""
            echo "=== Running dictionary tests ==="
            ./test_dict || echo "(dictionary file not present - expected in CI)"

            echo ""
            echo "=== Build successful ==="
            ls -lh bsdjp
            file bsdjp
