name: Build BSDJP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  full-build-ubuntu:
    name: Full Build (Ubuntu + xcb-imdkit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake gcc g++ pkg-config meson ninja-build \
            libxcb1-dev libxcb-util-dev libxcb-keysyms1-dev \
            libxcb-util0-dev xcb-proto \
            libcairo2-dev libpango1.0-dev \
            libx11-dev x11proto-dev \
            uthash-dev

      - name: Build and install xcb-imdkit from source
        run: |
          git clone https://github.com/fcitx/xcb-imdkit.git /tmp/xcb-imdkit
          cd /tmp/xcb-imdkit
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          echo "=== xcb-imdkit installed ==="
          pkg-config --modversion xcb-imdkit || echo "(pkg-config check)"

      - name: Configure BSDJP
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"

      - name: Build BSDJP
        run: |
          cd build
          make -j$(nproc) VERBOSE=1

      - name: Run tests
        run: |
          cd build
          echo "=== Running romaji tests ==="
          ./test_romaji
          echo ""
          echo "=== Running dict tests ==="
          ./test_dict || echo "(no dictionary file, expected in CI)"

      - name: Verify binary
        run: |
          ls -lh build/bsdjp
          file build/bsdjp

  build-freebsd:
    name: FreeBSD Build (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          sync: rsync
          mem: 8192
          copyback: false
          prepare: |
            pkg install -y \
              cmake \
              pkgconf \
              xcb-imdkit \
              libxcb \
              xcb-util \
              xcb-util-keysyms \
              cairo \
              pango \
              libX11 \
              xorgproto \
              ja-font-ipa

          run: |
            set -e
            freebsd-version
            mkdir -p build && cd build
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_FLAGS="-Wall -Wextra"
            make -j$(sysctl -n hw.ncpu)
            echo "=== Running tests ==="
            ./test_romaji
            ./test_dict || echo "(no dictionary, expected)"
            echo "=== Build successful ==="
            ls -lh bsdjp
            file bsdjp
