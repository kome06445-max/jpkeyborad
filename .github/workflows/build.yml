name: Build BSDJP on FreeBSD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-freebsd:
    name: FreeBSD Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          sync: sshfs
          mem: 4096
          prepare: |
            pkg install -y \
              cmake \
              pkgconf \
              xcb-imdkit \
              libxcb \
              xcb-util \
              xcb-util-keysyms \
              cairo \
              pango \
              libX11 \
              xorgproto \
              ja-font-ipa

          run: |
            set -e
            echo "=== Configuring ==="
            mkdir -p build
            cd build
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_FLAGS="-Wall -Wextra"

            echo ""
            echo "=== Building ==="
            make -j$(sysctl -n hw.ncpu)

            echo ""
            echo "=== Running romaji conversion tests ==="
            ./test_romaji

            echo ""
            echo "=== Running dictionary tests ==="
            ./test_dict || echo "(dictionary file not present, expected in CI)"

            echo ""
            echo "=== Build successful ==="
            ls -lh bsdjp
            file bsdjp
